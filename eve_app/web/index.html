<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Eve ESUI AI assistant prototype.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="eve_esui">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Eve ESUI AI</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      margin: 0;
      background: #f7f9fd;
      color: #162033;
      font-family: Arial, sans-serif;
    }

    .eve-loading {
      align-items: center;
      background: #f7f9fd;
      display: flex;
      flex-direction: column;
      gap: 12px;
      justify-content: center;
      inset: 0;
      position: fixed;
      text-align: center;
      z-index: 10;
    }

    .eve-mark {
      align-items: center;
      background: #203b94;
      border-radius: 8px;
      color: white;
      display: flex;
      font-size: 22px;
      font-weight: 900;
      height: 56px;
      justify-content: center;
      width: 56px;
    }

    .eve-loading strong {
      font-size: 18px;
    }

    .eve-loading span {
      color: #62708a;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="eve-loading" id="eve-loading">
    <div class="eve-mark">E</div>
    <strong>Loading Eve</strong>
    <span>Preparing the ESUI AI academic assistant...</span>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('eve-loading');
      if (loader) {
        loader.remove();
      }
    });
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
