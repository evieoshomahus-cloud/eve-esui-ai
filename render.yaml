services:
  - type: web
    name: eve-esui-ai
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: EVE_OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_API_KEY
        sync: false
